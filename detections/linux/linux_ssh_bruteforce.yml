title: Linux SSH Brute Force
id: cloudsoc-linux-001
status: experimental
description: Detects many failed SSH password attempts from the same source IP.
logsource:
  product: linux
  service: auth
detection:
  selection:
    message|contains: Failed password
  condition: selection
fields:
  - source_ip
  - user
  - host
level: medium
tags:
  - attack.credential_access
  - attack.t1110
