services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cloudsoc_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////data/cloudsoc.db
      - REPORT_DIR=/reports
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./reports:/reports
      - cloudsoc_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  dashboard:
    build:
      context: ./dashboard
    container_name: cloudsoc_dashboard
    ports:
      - "8501:8501"
    environment:
      - BACKEND_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  cloudsoc_data:
